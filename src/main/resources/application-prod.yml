spring:
  application:
    name: messageforge
  
  # Database Configuration - Production
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 40
      minimum-idle: 10
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      leak-detection-threshold: 60000

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        use_sql_comments: false
        jdbc:
          batch_size: 20
          fetch_size: 100
        order_inserts: true
        order_updates: true
        # Connection pooling
        c3p0:
          max_size: 40
          min_size: 10
    show-sql: false

  # Redis Configuration - Production
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD}
      ssl: true
      timeout: 5000
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 4
          max-wait: -1ms
        shutdown-timeout: 100ms

  # RabbitMQ Configuration - Production
  rabbitmq:
    host: ${RABBITMQ_HOST}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME}
    password: ${RABBITMQ_PASSWORD}
    virtual-host: /
    ssl:
      enabled: true
      verify-hostname: true
    listener:
      simple:
        concurrency: 10
        max-concurrency: 20
        prefetch: 15
        retry:
          enabled: true
          max-attempts: 3
          initial-interval: 1000

  # Jackson Configuration
  jackson:
    serialization:
      write-dates-as-timestamps: false
      indent-output: false
    default-property-inclusion: non_null
    time-zone: UTC

# Server Configuration - Production
server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api
  error:
    include-message: always
    include-stacktrace: never
  compression:
    enabled: true
    min-response-size: 1024
  tomcat:
    max-connections: 500
    max-threads: 200
    accept-count: 100
    connection-timeout: 20000
    use-relative-redirects: false

# Spring Security & JWT
app:
  jwt:
    secret: ${JWT_SECRET}
    expiration: ${JWT_EXPIRATION_MS:900000}
    refresh-expiration: ${JWT_REFRESH_EXPIRATION_MS:604800000}
  
  encryption:
    key: ${ENCRYPTION_KEY}

  api-keys:
    mailgun: ${MAILGUN_API_KEY}
    mailgun-domain: ${MAILGUN_DOMAIN}
    twilio-account-sid: ${TWILIO_ACCOUNT_SID}
    twilio-auth-token: ${TWILIO_AUTH_TOKEN}
    twilio-phone: ${TWILIO_PHONE}
    meta-app-id: ${META_APP_ID}
    meta-app-secret: ${META_APP_SECRET}
    slack-bot-token: ${SLACK_BOT_TOKEN}
    twitter-api-key: ${TWITTER_API_KEY}
    twitter-api-secret: ${TWITTER_API_SECRET}

  features:
    email-enabled: true
    sms-enabled: true
    facebook-enabled: true
    whatsapp-enabled: true
    linkedin-enabled: true
    slack-enabled: true
    twitter-enabled: true
    telegram-enabled: true

# Actuator Configuration - Production
management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus,info
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  health:
    livenessState:
      enabled: true
    readinessState:
      enabled: true
    circuitbreakers:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
  tracing:
    sampling:
      probability: 0.1

# Logging Configuration - Production
logging:
  level:
    root: WARN
    com.messageforge: INFO
    org.springframework.security: WARN
    org.hibernate: ERROR
  pattern:
    console: "%d{ISO8601} %5p %t %c{36} - %m%n"
    file: "%d{ISO8601} %5p %t %c{36} - %m%n"
  file:
    name: /var/log/messageforge/app.log
    max-size: 100MB
    max-history: 30
    total-size-cap: 1GB

# HTTPS/SSL Configuration
server:
  ssl:
    enabled: true
    key-store: ${SSL_KEYSTORE_PATH}
    key-store-password: ${SSL_KEYSTORE_PASSWORD}
    key-store-type: PKCS12
    key-alias: tomcat

# Flyway
spring:
  flyway:
    baseline-on-migrate: false
    enabled: true
    locations: classpath:db/migration
