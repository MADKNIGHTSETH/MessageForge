services:
  # -------------------------------------
  # 1. YOUR SPRING MVC APPLICATION
  # -------------------------------------
  messageforge-app:
    build: .  # Tells Docker to look for your Dockerfile in this folder
    container_name: messageforge-app
    ports:
      - "8080:8080"
    networks:
      - messageforge-network
    environment:
      # Connect to Postgres
      - DB_URL=jdbc:postgresql://postgres:5432/messageforge
      - DB_USERNAME=postgres
      - DB_PASSWORD=postgres
      # Connect to Redis
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      # Connect to RabbitMQ
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USERNAME=guest
      - RABBITMQ_PASSWORD=guest
      # HS512 JWT signing key must be at least 64 bytes.
      - JWT_SECRET=dev-messageforge-jwt-secret-change-this-before-production-64-characters-minimum
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

  # -------------------------------------
  # 2. INFRASTRUCTURE & DATABASES
  # -------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: messageforge-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: messageforge
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - messageforge-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: >
      postgres
      -c max_connections=200
      -c shared_buffers=256MB
      -c effective_cache_size=1GB

  redis:
    image: redis:7-alpine
    container_name: messageforge-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - messageforge-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: redis-server --appendonly yes

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: messageforge-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - messageforge-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: messageforge-pgadmin
    profiles:
      - tools
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    networks:
      - messageforge-network
    depends_on:
      postgres:
        condition: service_healthy

networks:
  messageforge-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
